name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  template-pack:
    name: Validate template scaffolds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install template
        run: dotnet new install .

      - name: Scaffold a project from the template
        run: dotnet new dotnet-api -n Acme.Sample -o ../scaffold-test

      # Restore and build are split: a combined `dotnet build` restores projects in
      # parallel on a fresh tree and can hit a "file already exists" race in obj/.
      - name: Restore the scaffolded project
        working-directory: ../scaffold-test
        run: dotnet restore

      - name: Build the scaffolded project
        working-directory: ../scaffold-test
        run: dotnet build --no-restore --configuration Release
