services:
  db:
    container_name: DotnetApiTemplateDb
    image: postgres:17.7-alpine
    restart: always
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-DotnetApiTemplateDb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - 54320:5432

volumes:
  postgres-data:
