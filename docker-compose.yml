services:
  db:
    container_name: DotnetApiTemplateDb
    image: postgres:17.7-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: DotnetApiTemplateDb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - 54320:5432

volumes:
  postgres-data:
